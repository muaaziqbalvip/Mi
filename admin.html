<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MiTV Admin - Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        .glow { box-shadow: 0 0 20px rgba(229, 9, 20, 0.4); }
        body { background: radial-gradient(circle at top, #1a1a1a, #000); min-height: 100vh; color: white; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-12 border-b border-zinc-800 pb-6">
            <h1 class="text-4xl font-black text-red-600 tracking-tighter">MiTV ADMIN <span class="text-white text-sm font-light uppercase tracking-widest ml-2">v2.0</span></h1>
            <button onclick="logout()" class="bg-zinc-800 px-4 py-2 rounded text-xs hover:bg-zinc-700 transition">LOGOUT</button>
        </header>

        <div id="login-box" class="hidden max-w-md mx-auto bg-zinc-900 p-8 rounded-xl border border-zinc-800 glow">
            <h2 class="text-xl font-bold mb-6 text-center">Authentication Required</h2>
            <input id="email" type="email" placeholder="Admin Email" class="w-full p-3 mb-4 bg-black border border-zinc-700 rounded focus:border-red-600 outline-none">
            <input id="pass" type="password" placeholder="Admin Password" class="w-full p-3 mb-6 bg-black border border-zinc-700 rounded focus:border-red-600 outline-none">
            <button onclick="login()" class="w-full bg-red-600 py-3 rounded font-bold hover:bg-red-700 transition">ACCESS PANEL</button>
        </div>

        <div id="admin-panel" class="hidden space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-zinc-900 p-6 rounded-xl border border-zinc-800">
                    <h3 class="text-lg font-bold mb-4 text-red-500">Stream Source Management</h3>
                    <label class="block text-xs text-gray-500 mb-2 uppercase">Original M3U URL</label>
                    <input id="m3u-input" type="text" class="w-full p-3 bg-black border border-zinc-700 rounded mb-4 text-sm outline-none focus:border-red-600" placeholder="Paste .m3u link here">
                    <button onclick="updateLink()" class="w-full bg-white text-black py-2 rounded font-bold hover:bg-gray-200 transition">UPDATE GLOBAL SOURCE</button>
                </div>

                <div class="bg-zinc-900 p-6 rounded-xl border border-zinc-800">
                    <h3 class="text-lg font-bold mb-4 text-red-500">Real-time Stats</h3>
                    <div class="space-y-4">
                        <div class="flex justify-between border-b border-zinc-800 pb-2">
                            <span class="text-gray-400">Database Status:</span>
                            <span class="text-green-500 font-mono">ONLINE</span>
                        </div>
                        <div class="flex justify-between border-b border-zinc-800 pb-2">
                            <span class="text-gray-400">Masking Proxy:</span>
                            <span class="text-blue-400 font-mono italic">ACTIVE</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBbnU8DkthpYQMHOLLyj6M0cc05qXfjMcw",
            authDomain: "ramadan-2385b.firebaseapp.com",
            databaseURL: "https://ramadan-2385b-default-rtdb.firebaseio.com",
            projectId: "ramadan-2385b",
            storageBucket: "ramadan-2385b.firebasestorage.app",
            messagingSenderId: "882828936310",
            appId: "1:882828936310:web:7f97b921031fe130fe4b57"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        function login() {
            auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value)
                .catch(e => alert(e.message));
        }

        function logout() { auth.signOut(); }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                // Load current link
                db.ref('settings/m3u_source').once('value', s => {
                    if(s.exists()) document.getElementById('m3u-input').value = s.val();
                });
            } else {
                document.getElementById('login-box').classList.remove('hidden');
                document.getElementById('admin-panel').classList.add('hidden');
            }
        });

        function updateLink() {
            const newLink = document.getElementById('m3u-input').value;
            db.ref('settings').update({ m3u_source: newLink })
                .then(() => alert("Source Updated! All users will see the new content."))
                .catch(e => alert(e.message));
        }
    </script>
</body>
            </html>
