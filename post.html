<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiTV Post Generator | Muslim Islam Network</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

    <style>
        /* =========================================================================
           MITV PREMIUM DESIGN SYSTEM (CYBERPUNK NEON THEME)
           FOUNDER: MUAAZ IQBAL
           =========================================================================
        */
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --accent: #ff0055;
            --bg-dark: #0a0b10;
            --card-bg: rgba(20, 22, 32, 0.8);
            --text-main: #ffffff;
            --text-muted: #8b8f9d;
            --glow: 0 0 15px rgba(0, 242, 255, 0.4);
            --neon-border: 1px solid rgba(0, 242, 255, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(112, 0, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 242, 255, 0.1) 0%, transparent 40%);
            overflow-x: hidden;
            padding: 20px;
        }

        /* Container Styling */
        .master-container {
            width: 100%;
            max-width: 700px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: var(--neon-border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header Section */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .brand-badge {
            display: inline-block;
            padding: 6px 12px;
            background: rgba(112, 0, 255, 0.15);
            border: 1px solid var(--secondary);
            border-radius: 100px;
            color: var(--secondary);
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        /* Input Group */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            margin-left: 5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: 16px;
        }

        .input-wrapper input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 14px 14px 45px;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0, 242, 255, 0.05);
            box-shadow: var(--glow);
        }

        /* Action Button */
        .btn-generate {
            width: 100%;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            border: none;
            padding: 16px;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.4s;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(112, 0, 255, 0.3);
        }

        .btn-generate:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 242, 255, 0.4);
            filter: brightness(1.1);
        }

        /* Output Area */
        .output-section {
            margin-top: 35px;
            display: none;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .output-header h3 {
            font-size: 15px;
            color: var(--primary);
        }

        .preview-box {
            width: 100%;
            min-height: 250px;
            background: #11141d;
            border: 1px dashed rgba(0, 242, 255, 0.3);
            border-radius: 16px;
            padding: 20px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            color: #d1d5db;
            margin-bottom: 20px;
            font-family: 'JetBrains Mono', monospace;
        }

        .copy-btn {
            background: #25d366; /* WhatsApp Green */
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .copy-btn:hover {
            background: #1eb954;
            transform: scale(1.02);
        }

        /* Success Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--primary);
            color: var(--bg-dark);
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 14px;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Footer Info */
        .footer-credits {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .footer-credits b {
            color: var(--primary);
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .master-container {
                padding: 20px;
            }
            .header h1 {
                font-size: 22px;
            }
        }
    </style>
</head>

        function copyToClipboard() {
