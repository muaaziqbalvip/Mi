<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MiTV Control Panel | MUSLIM ISLAM</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================================
           MITV NETWORK MOBILE APP CSS (PREMIUM DARK MODE)
           =========================================================
        */
        :root {
            --primary: #00e5ff;
            --secondary: #ff0055;
            --bg-dark: #05080f;
            --panel-bg: #0d121d;
            --text-glow: 0 0 10px rgba(0, 229, 255, 0.5);
            --card-radius: 15px;
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Particles Background */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at top, #0a192f 0%, #05080f 100%);
        }

        /* ---------------------------------------------------------
           AUTHENTICATION (MOBILE DESIGN)
           --------------------------------------------------------- */
        #auth-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .mi-logo-container {
            margin-bottom: 40px;
            text-align: center;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .mi-logo-circle {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--primary), #0077ff);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 38px;
            font-weight: 900;
            color: #000;
            box-shadow: 0 0 40px var(--primary);
            position: relative;
        }

        .mi-logo-circle::after {
            content: 'NETWORK';
            position: absolute;
            bottom: -25px;
            font-size: 12px;
            letter-spacing: 5px;
            color: var(--primary);
        }

        .auth-card {
            width: 100%;
            max-width: 350px;
            background: var(--panel-bg);
            padding: 30px;
            border-radius: var(--card-radius);
            border: 1px solid rgba(0, 229, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .auth-input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .auth-input-group input {
            width: 100%;
            padding: 15px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            text-align: center;
            font-size: 18px;
            letter-spacing: 4px;
            outline: none;
            transition: 0.3s;
        }

        .auth-input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
        }

        /* ---------------------------------------------------------
           MAIN APP LAYOUT (MOBILE)
           --------------------------------------------------------- */
        #app-shell {
            display: none;
            flex-direction: column;
            height: 100vh;
        }

        /* Fixed Top Header */
        .app-header {
            height: 65px;
            background: rgba(13, 18, 29, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid rgba(0, 229, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 900;
            color: #fff;
        }

        .header-logo span { color: var(--primary); }

        .status-dot {
            width: 10px; height: 10px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 8px #00ff88;
        }

        /* Scrollable Content Area */
        .app-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 100px; /* Space for Nav */
        }

        /* Bottom Navigation Bar (App Style) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: #0a0e17;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: var(--safe-bottom);
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #6b7c93;
            text-decoration: none;
            font-size: 11px;
            font-weight: 700;
            transition: 0.3s;
            cursor: pointer;
        }

        .nav-item i { font-size: 20px; margin-bottom: 5px; }
        .nav-item.active { color: var(--primary); }
        .nav-item.active i { filter: drop-shadow(0 0 8px var(--primary)); }

        /* ---------------------------------------------------------
           CARDS & FORMS (MOBILE OPTIMIZED)
           --------------------------------------------------------- */
        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            margin-bottom: 15px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mobile-card {
            background: var(--panel-bg);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .m-input {
            width: 100%;
            background: #05080f;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 15px;
            border-radius: 10px;
            color: #fff;
            margin-bottom: 12px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
        }

        .m-btn {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: var(--primary);
            color: #000;
            font-weight: 800;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        /* ---------------------------------------------------------
           MASKED USER LIST
           --------------------------------------------------------- */
        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.02);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            border-left: 4px solid var(--primary);
        }

        .user-info h4 { font-size: 16px; margin-bottom: 2px; }
        .user-info p { font-size: 12px; color: #6b7c93; font-family: 'Share Tech Mono'; }

        .mask-badge {
            background: rgba(0, 229, 255, 0.1);
            color: var(--primary);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: bold;
        }

        .action-btns {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            width: 35px; height: 35px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            border: none;
        }

        .icon-btn.delete { color: var(--secondary); }

        /* Toast Notifications */
        #toast-box {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10001;
            width: 90%;
        }

        .toast {
            background: #1a1a1a;
            color: #fff;
            padding: 15px;
            border-radius: 10px;
            border-bottom: 3px solid var(--primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 10px;
            animation: slideDown 0.4s ease forwards;
        }

        @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="auth-screen">
        <div class="mi-logo-container">
            <div class="mi-logo-circle">Mi</div>
        </div>
        
        <div class="auth-card">
            <h2 style="text-align:center; font-family:'Orbitron'; font-size:18px; margin-bottom:20px;">ADMIN LOGIN</h2>
            <div class="auth-input-group">
                <input type="password" id="master-key" placeholder="••••••••" maxlength="12">
            </div>
            <button class="login-btn" onclick="handleLogin()">Unlock Access</button>
            <p id="auth-msg" style="color:var(--secondary); font-size:12px; text-align:center; margin-top:15px; display:none;">Invalid Key!</p>
        </div>
    </div>

    <div id="app-shell">
        
        <header class="app-header">
            <div class="header-logo">MiTV <span>PRO</span></div>
            <div style="display:flex; align-items:center; gap:10px;">
                <span style="font-size:12px; font-weight:bold; color:#6b7c93;">SERVER</span>
                <div class="status-dot"></div>
            </div>
        </header>

        <main class="app-content">
            
            <div id="view-users">
                <div class="section-title"><i class="fas fa-user-plus"></i> GENERATE MASKED M3U</div>
                
                <div class="mobile-card">
                    <input type="text" id="user-name" class="m-input" placeholder="Client Name (e.g. Maaz)">
                    <input type="text" id="user-slug" class="m-input" placeholder="Custom ID (e.g. maaz-001)">
                    <button class="m-btn" onclick="generateMaskedUser()">
                        <i class="fas fa-shield-alt"></i> GENERATE SECURE LINK
                    </button>
                </div>

                <div class="section-title"><i class="fas fa-users"></i> ACTIVE CLIENTS</div>
                <div id="user-list-target">
                    </div>
            </div>

            <div id="view-channels" style="display:none;">
                <div class="section-title"><i class="fas fa-cloud-download-alt"></i> IMPORT POOL</div>
                <div class="mobile-card">
                    <textarea id="raw-m3u" class="m-input" style="height:100px;" placeholder="Paste M3U content or link here..."></textarea>
                    <button class="m-btn" style="background:#0077ff; color:#fff;" onclick="parseM3U()">
                        <i class="fas fa-sync"></i> SYNC WITH CLOUD
                    </button>
                </div>
                <div id="channel-list-target"></div>
            </div>

            <div id="view-radar" style="display:none;">
                <div class="section-title"><i class="fas fa-satellite-dish"></i> LIVE TRAFFIC</div>
                <div id="radar-logs" style="font-family:'Share Tech Mono'; font-size:12px;">
                    </div>
            </div>

        </main>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchView('users', this)">
                <i class="fas fa-user-shield"></i>
                <span>USERS</span>
            </div>
            <div class="nav-item" onclick="switchView('channels', this)">
                <i class="fas fa-tv"></i>
                <span>POOL</span>
            </div>
            <div class="nav-item" onclick="switchView('radar', this)">
                <i class="fas fa-broadcast-tower"></i>
                <span>RADAR</span>
            </div>
            <div class="nav-item" onclick="location.reload()">
                <i class="fas fa-power-off"></i>
                <span>EXIT</span>
            </div>
        </nav>
    </div>

    <div id="toast-box"></div>

    <script>
        /* =========================================================
           MITV NETWORK - CORE LOGIC ENGINE (1000+ LINES CAPABLE)
           =========================================================
        */

        // Firebase Setup
        const config = {
            apiKey: "AIzaSyBbnU8DkthpYQMHOLLyj6M0cc05qXfjMcw",
            databaseURL: "https://ramadan-2385b-default-rtdb.firebaseio.com",
            projectId: "ramadan-2385b",
        };
        firebase.initializeApp(config);
        const db = firebase.database();

        const MASTER_PASS = "mitv123456";
        const VERCEL_URL = "https://mitv-tan.vercel.app"; // Apka masked backend

        // UI View Switcher
        function switchView(viewName, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');

            document.getElementById('view-users').style.display = 'none';
            document.getElementById('view-channels').style.display = 'none';
            document.getElementById('view-radar').style.display = 'none';

            document.getElementById('view-' + viewName).style.display = 'block';
        }

        // Authentication
        function handleLogin() {
            const val = document.getElementById('master-key').value;
            if(val === MASTER_PASS) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-shell').style.display = 'flex';
                showToast("Access Granted: Welcome Maaz", "success");
                initApp();
            } else {
                document.getElementById('auth-msg').style.display = 'block';
                setTimeout(() => document.getElementById('auth-msg').style.display = 'none', 2000);
            }
        }

        // M3U MASKING LOGIC & USER GENERATION
        function generateMaskedUser() {
            const name = document.getElementById('user-name').value.trim();
            const slug = document.getElementById('user-slug').value.trim().toLowerCase().replace(/\s+/g, '-');

            if(!name || !slug) return showToast("Please fill all fields", "error");

            // Generate a Masking Token (Base64 + Random Salt)
            const salt = Math.random().toString(36).substring(7);
            const token = btoa(slug + "|" + salt);

            // MASKED LINK STRUCTURE: 
            // Instead of showing actual IPTV links, we show this:
            const maskedLink = `${VERCEL_URL}/api/stream?key=${token}`;

            const userData = {
                name: name,
                token: token,
                masked_m3u: maskedLink,
                status: "active",
                created: Date.now()
            };

            db.ref('m3u_users/' + slug).set(userData).then(() => {
                showToast("User Generated & Masked!", "success");
                document.getElementById('user-name').value = '';
                document.getElementById('user-slug').value = '';
            });
        }

        // Init App & Realtime Listeners
        function initApp() {
            // Listen Users
            db.ref('m3u_users').on('value', snap => {
                const data = snap.val();
                const container = document.getElementById('user-list-target');
                container.innerHTML = '';
                
                if(data) {
                    Object.keys(data).forEach(id => {
                        const u = data[id];
                        container.innerHTML += `
                            <div class="user-item">
                                <div class="user-info">
                                    <h4>${u.name} <span class="mask-badge">MASKED</span></h4>
                                    <p>${u.masked_m3u.substring(0, 35)}...</p>
                                </div>
                                <div class="action-btns">
                                    <button class="icon-btn" onclick="copyLink('${u.masked_m3u}')"><i class="fas fa-copy"></i></button>
                                    <button class="icon-btn delete" onclick="deleteUser('${id}')"><i class="fas fa-trash"></i></button>
                                </div>
                            </div>
                        `;
                    });
                }
            });

            // Listen Radar
            db.ref('m3u_activity_logs').limitToLast(10).on('value', snap => {
                const logs = snap.val();
                const container = document.getElementById('radar-logs');
                container.innerHTML = '';
                if(logs) {
                    Object.values(logs).forEach(l => {
                        container.innerHTML = `<div>[${new Date(l.timestamp).toLocaleTimeString()}] ${l.ip} -> ${l.target}</div>` + container.innerHTML;
                    });
                }
            });
        }

        // Utilities
        function copyLink(link) {
            navigator.clipboard.writeText(link);
            showToast("Masked link copied!", "success");
        }

        function deleteUser(id) {
            if(confirm("Delete this user?")) db.ref('m3u_users/' + id).remove();
        }

        function showToast(msg, type) {
            const box = document.getElementById('toast-box');
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerText = msg;
            box.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        // Particle Background Logic
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if(this.x > canvas.width) this.x = 0;
                if(this.x < 0) this.x = canvas.width;
                if(this.y > canvas.height) this.y = 0;
                if(this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(0, 229, 255, 0.3)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            for(let i=0; i<50; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        initParticles();
        animate();

    </script>
</body>
</html>
